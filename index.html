<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Welcome to Information Page</h2>
    <form action="process.php" method="post">
        <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Enter your first name">
        </div>
        <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Enter your last name">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="555-555-5555">
        </div>
        <div class="form-group">
            <label for="countryInput">Your Country</label>
            <input type="text" id="countryInput" list="countryList" placeholder="Select your country">
            <datalist id="countryList">
                <option value="Iraq">Iraq</option>
                <option value="KSA">KSA</option>
                <option value="Qatar">Qatar</option>
                <option value="UAE">UAE</option>
            </datalist>
        </div>
        <button type="submit">Submit Information</button>
    </form>
</div>

</body>
</html>
